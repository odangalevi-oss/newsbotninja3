<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login · Newsbotninja 🥷</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="container navbar__inner">
    <a href="index.html" class="navbar__logo">Newsbotninja 🥷</a>
    <div class="navbar__categories">
      <a href="index.html"         class="category-link">Top Headlines</a>
      <a href="kenya.html"         class="category-link">Kenya</a>
      <a href="technology.html"    class="category-link">Technology</a>
      <a href="business.html"      class="category-link">Business</a>
      <a href="sports.html"        class="category-link">Sports</a>
      <a href="health.html"        class="category-link">Health</a>
      <a href="entertainment.html" class="category-link">Entertainment</a>
      <a href="world.html"         class="category-link">World</a>
      <a href="science.html"       class="category-link">Science</a>
    </div>
    <div class="navbar__auth" style="margin-left:auto">
      <a href="login.html"    class="auth-link active" style="background:var(--accent-light);color:var(--accent)">Login</a>
      <a href="register.html" class="auth-link auth-link--register">Register</a>
    </div>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </div>
</nav>

<main>
  <div class="container">
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-header">
          <span class="auth-logo">🥷</span>
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle">Log in to Newsbotninja</p>
        </div>
        <div class="auth-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" placeholder="you@example.com"/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" placeholder="••••••••"/>
          </div>
          <button class="form-btn" onclick="showToast('🥷 Logging in…')">Log In →</button>
        </div>
        <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
      </div>
    </div>
  </div>
</main>

<footer><span class="footer__brand">Newsbotninja 🥷</span> &nbsp;·&nbsp; created by <span class="footer__author">Odanga</span></footer>
<div class="toast" id="toast"></div>
<script>
const html=document.documentElement,btn=document.getElementById('themeToggle');
if(localStorage.getItem('theme')==='light'){html.classList.add('light');btn.textContent='☀️';}
btn.addEventListener('click',()=>{const l=html.classList.toggle('light');btn.textContent=l?'☀️':'🌙';localStorage.setItem('theme',l?'light':'dark');});
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
</html>
